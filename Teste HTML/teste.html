<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Front de Teste</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .formulario { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; width: 300px; }
        input { display: block; margin-bottom: 10px; width: 90%; padding: 5px; }
        button { padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Cadastro de Usuário (Teste)</h2>
    
    <div class="formulario">
        <input type="text" id="nomeInput" placeholder="Digite o Nome">
        <input type="text" id="emailInput" placeholder="Digite o Email">
        <button onclick="salvarDados()">Enviar para o Back-end</button>
    </div>

    <h3>Dados no Banco (H2):</h3>
    <ul id="listaUsuarios"></ul>

    <script>
        // Função que pega os dados dos inputs e manda para o Spring Boot (POST)
        async function salvarDados() {
            const nome = document.getElementById('nomeInput').value;
            const email = document.getElementById('emailInput').value;

            // Envia a requisição para a porta 8080 (onde o Spring Boot roda)
            await fetch('http://localhost:8080/usuarios', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ nome: nome, email: email })
            });

            alert("Enviado! Verifique a lista.");
            document.getElementById('nomeInput').value = ''; // limpa o input
            document.getElementById('emailInput').value = ''; // limpa o input
            buscarDados(); // Atualiza a lista na tela
        }

        // Função que busca os dados no Spring Boot (GET) e joga na tela
        async function buscarDados() {
            const resposta = await fetch('http://localhost:8080/usuarios');
            const usuarios = await resposta.json();

            const lista = document.getElementById('listaUsuarios');
            lista.innerHTML = ''; // Limpa a lista antes de preencher

            usuarios.forEach(usuario => {
                const item = document.createElement('li');
                item.textContent = `ID: ${usuario.id} | Nome: ${usuario.nome} | Email: ${usuario.email}`;
                lista.appendChild(item);
            });
        }

        // Já chama a função para listar os dados assim que abrir a página
        buscarDados();
    </script>
</body>
</html>
